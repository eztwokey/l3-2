<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortener</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.4rem; }
        h2 { font-size: 1.1rem; color: #555; margin-top: 2rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.2rem; color: #555; }
        input { width: 100%; padding: 0.4rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.9rem; margin-bottom: 0.8rem; }
        button { padding: 0.4rem 1rem; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; font-size: 0.85rem; background: #fff; }
        button:hover { background: #f0f0f0; }
        .btn-primary { background: #4f46e5; color: #fff; border: none; }
        .btn-primary:hover { background: #4338ca; }
        .result { background: #f9f9f9; border: 1px solid #ddd; padding: 0.8rem; margin-top: 0.8rem; border-radius: 3px; word-break: break-all; font-size: 0.85rem; }
        .result a { color: #4f46e5; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; text-align: left; }
        th { background: #f5f5f5; }
        .hidden { display: none; }
    </style>
</head>
<body>

<h1>Shortener</h1>

<h2>Создать ссылку</h2>
<label>URL</label>
<input type="text" id="url" placeholder="https://example.com/long/path">
<label>Кастомный код (необязательно)</label>
<input type="text" id="customCode" placeholder="my-link">
<button class="btn-primary" onclick="create()">Сократить</button>
<div id="createResult" class="result hidden"></div>

<h2>Аналитика</h2>
<label>Короткий код</label>
<input type="text" id="analyticsCode" placeholder="abc123">
<button onclick="loadAnalytics()">Показать</button>
<div id="analyticsResult" class="hidden">
    <div class="result" id="analyticsInfo"></div>
    <h3 style="font-size:0.95rem; margin-top:1rem;">По дням</h3>
    <table id="byDay"><tr><th>Дата</th><th>Клики</th></tr></table>
    <h3 style="font-size:0.95rem; margin-top:1rem;">По месяцам</h3>
    <table id="byMonth"><tr><th>Месяц</th><th>Клики</th></tr></table>
    <h3 style="font-size:0.95rem; margin-top:1rem;">По User-Agent</h3>
    <table id="byUA"><tr><th>User-Agent</th><th>Клики</th></tr></table>
</div>

<script>
    async function create() {
        const url = document.getElementById('url').value.trim();
        if (!url) return alert('Введите URL');
        const body = { url };
        const custom = document.getElementById('customCode').value.trim();
        if (custom) body.custom_code = custom;

        try {
            const r = await fetch('/shorten', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            if (!r.ok) { const e = await r.json(); throw new Error(e.error); }
            const d = await r.json();
            const el = document.getElementById('createResult');
            el.innerHTML = 'Короткая ссылка: <a href="' + d.short_url + '" target="_blank">' + d.short_url + '</a><br>Код: ' + d.short_code;
            el.classList.remove('hidden');
            document.getElementById('analyticsCode').value = d.short_code;
        } catch (e) { alert('Ошибка: ' + e.message); }
    }

    async function loadAnalytics() {
        const code = document.getElementById('analyticsCode').value.trim();
        if (!code) return alert('Введите код');

        try {
            const r = await fetch('/analytics/' + code);
            if (!r.ok) { const e = await r.json(); throw new Error(e.error); }
            const d = await r.json();

            document.getElementById('analyticsInfo').innerHTML =
                'Код: ' + d.short_code + '<br>URL: ' + d.original_url + '<br>Всего кликов: ' + d.total_clicks;

            fillTable('byDay', d.by_day || [], ['date', 'clicks']);
            fillTable('byMonth', d.by_month || [], ['month', 'clicks']);
            fillTable('byUA', d.by_user_agent || [], ['user_agent', 'clicks']);

            document.getElementById('analyticsResult').classList.remove('hidden');
        } catch (e) { alert('Ошибка: ' + e.message); }
    }

    function fillTable(id, rows, keys) {
        const t = document.getElementById(id);
        const header = t.rows[0].innerHTML;
        t.innerHTML = '<tr>' + header + '</tr>';
        rows.forEach(row => {
            const tr = t.insertRow();
            keys.forEach(k => { tr.insertCell().textContent = row[k]; });
        });
    }
</script>

</body>
</html>
